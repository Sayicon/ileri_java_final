server:
  port: 8081

spring:
  application:
    name: service-auth

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/authdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  flyway:
    enabled: true
    locations: classpath:db/migration

redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdGVzdGluZyBhbmQgaXMgbG9uZw==}
  expiry-ms: ${JWT_EXPIRY_MS:3600000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
